name: Run Discord Bot

on:
  schedule:
    # Runs every 6 hours. The bot process runs for ~5hr 50min so there is only
    # a brief (~10 min) restart window between consecutive runs.
    - cron: '0 */6 * * *'
  # Allow manual starts / restarts from the Actions tab.
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Stay just under the 6-hour GitHub Actions job limit.
    timeout-minutes: 355

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Restore the SQLite database from the most recent cached run so that
      # tracked games and notification channels survive across restarts.
      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: steam_watchlist.db
          # A unique key per run ensures the post-job save always writes a
          # fresh entry; restore-keys picks up the latest existing cache.
          key: steam-db-${{ github.run_id }}
          restore-keys: |
            steam-db-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      # Run the bot for 5hr 50min (21000 s), then let the job finish
      # so the cache-save step can persist the updated database.
      # `|| true` prevents a non-zero exit code from timeout from failing
      # the workflow (exit code 124 = timed out normally).
      - name: Run bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: timeout 21000 python bot.py || true
